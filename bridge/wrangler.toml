name = "familiar-bridge"
main = "src/index.ts"
compatibility_date = "2025-05-01"

[[d1_databases]]
binding = "DB"
database_name = "familiar-bridge-db"
database_id = "e0bac50e-a39b-4775-96e5-51fb2cf388e0"

# Audio storage for voice notes generated by the agent's send_voice_note tool.
[[r2_buckets]]
binding = "AUDIO"
bucket_name = "familiar-audio"

# No [triggers] cron: autonomous check-ins run on Letta's native scheduling
# (POST /v1/agents/{id}/schedule), driven from the browser.
